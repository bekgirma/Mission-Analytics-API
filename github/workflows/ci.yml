name: CI Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with: {python-version: '3.12'}
      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx
      - name: Run Tests
        run: pytest test_api.py